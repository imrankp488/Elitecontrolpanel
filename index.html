<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMRAN PLAYZ | ELITE SYSTEM v16.0</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
/* SAME UI (UNCHANGED) */
body{background:#000;color:#00ff41;font-family:monospace}
.upload-box{border:2px dashed #444;padding:20px;position:relative}
input[type=file]{position:absolute;width:100%;height:100%;opacity:0}
</style>
</head>
<body>

<div class="upload-box">
<span id="fn">Select Image</span>
<input type="file" id="p-img" accept="image/*">
</div>

<button onclick="uploadImgBB()" id="up-btn">UPLOAD</button>

<script>
const IMGBB_KEY="47d4ddf5133629b43bb606ec944137f9";

/* ✅ FIX 1: IMAGE NAME SHOW */
document.getElementById("p-img").addEventListener("change", function(e){
    const file = e.target.files[0];   // ✅ FIX
    const nameBox = document.getElementById("fn");

    if(file){
        nameBox.innerText = file.name;
    } else {
        nameBox.innerText = "Select Image";
    }
});


/* ✅ FIX 2: IMG UPLOAD */
async function uploadImgBB(){

 const file = document.getElementById('p-img').files[0]; // ✅ FIX

 if(!file){
   alert("Select image first");
   return;
 }

 const btn=document.getElementById('up-btn');
 btn.innerText="UPLOADING...";
 btn.disabled=true;

 const reader=new FileReader();

 reader.onloadend = async () => {
   try{
     const base64 = reader.result.split(',')[1]; // ✅ FIX

     const fd=new FormData();
     fd.append("image", base64);

     const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{
       method:"POST",
       body:fd
     });

     const d=await res.json();

     if(d.success){
       alert("Upload Success ✅\nURL: "+d.data.url);
     } else {
       throw new Error();
     }

   }catch(e){
     alert("Upload Failed ❌");
   }

   btn.innerText="UPLOAD";
   btn.disabled=false;
 };

 reader.readAsDataURL(file); // ✅ FIX
}
</script>

</body>
</html>
