<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMRAN PLAYZ | SECURE PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --r: #ff3131; --b: #000; }
        * { box-sizing: border-box; }
        body { background: var(--b); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 15px; }
        .terminal { width: 100%; max-width: 400px; border: 1.5px solid var(--p); border-radius: 10px; padding: 25px; background: rgba(0, 10, 0, 0.98); box-shadow: 0 0 15px var(--p); }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--p); color: var(--p); margin-bottom: 15px; outline: none; font-family: inherit; }
        button { width: 100%; padding: 12px; background: transparent; border: 1.5px solid var(--p); color: var(--p); font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; font-family: inherit; }
        button:active { background: var(--p); color: #000; }
        .btn-red { border-color: var(--r); color: var(--r); }
        .loader { display: none; text-align: center; margin: 20px 0; }
        .bar-bg { width: 100%; height: 8px; border: 1px solid var(--p); margin: 10px 0; }
        .bar-f { width: 0%; height: 100%; background: var(--p); transition: 0.2s; }
        #res { display: none; margin-top: 15px; border: 1px dashed var(--p); padding: 10px; font-size: 12px; max-height: 250px; overflow-y: auto; }
        .row { border-bottom: 1px solid rgba(0,255,0,0.1); padding: 5px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="terminal">
    <div id="login-scr">
        <h1 style="text-align:center; font-size:18px;">AUTHORIZATION</h1>
        <input type="text" id="u" placeholder="USERNAME">
        <input type="password" id="p" placeholder="PASSWORD">
        <button onclick="login()">ENTER SYSTEM</button>
    </div>

    <div id="main-scr" style="display:none;">
        <h1 style="text-align:center; font-size:18px;">COMMAND CENTER</h1>
        <input type="text" id="target" placeholder="NUMBER / VEHICLE RC">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="run('mob')">Number Info</button>
            <button onclick="run('veh')">Vehicle Info</button>
        </div>
        <button class="btn-red" onclick="location.reload()">LOGOUT</button>
    </div>

    <div id="load-scr" class="loader">
        <p id="l-txt">BYPASSING...</p>
        <div class="bar-bg"><div id="bar" class="bar-f"></div></div>
        <button class="btn-red" onclick="abort()">CANCEL</button>
    </div>

    <div id="res"></div>
    <p style="text-align:center; font-size:9px; margin-top:15px; opacity:0.5;">POWERED BY IMRAN PLAYZ</p>
</div>

<script>
    // --- CONFIG ---
    const config = {
        apiKey: "AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
        authDomain: "adminpanel-6b862.firebaseapp.com",
        databaseURL: "https://adminpanel-6b862-default-rtdb.firebaseio.com",
        projectId: "adminpanel-6b862"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    // API Links (Encrypted to stop stealing)
    const _u = {
        m: "aHR0cHM6Ly95YXNoLWNvZGUtd2l0aC1haS5hbHBoYW1vdmllcy53b3JrZXJzLmRldi8/bnVtPQ==",
        v: "dmVoaWNsZS1laWdodC12ZXJ0LnZlcmNlbC5hcHAvYXBpP3JjPQ==",
        k: "NzE4OTgxNDAyMQ=="
    };

    function login() {
        const user = document.getElementById('u').value.trim();
        const pass = document.getElementById('p').value.trim();

        // Direct Login (Hardcoded for now to avoid 'Invalid' error)
        if((user === "imran" && pass === "imran786") || (user === "user123" && pass === "password18")) {
            document.getElementById('login-scr').style.display = 'none';
            document.getElementById('main-scr').style.display = 'block';
            db.ref('logs/' + Date.now()).set({ user: user, action: "LOGIN", time: new Date().toLocaleString() });
        } else {
            alert("ACCESS DENIED!");
        }
    }

    let ctrl, anim;
    async function run(type) {
        const val = document.getElementById('target').value.trim();
        if(!val) return alert("Enter Target!");

        document.getElementById('main-scr').style.display = 'none';
        document.getElementById('load-scr').style.display = 'block';
        document.getElementById('res').style.display = 'none';

        let p = 0;
        anim = setInterval(() => {
            p += 5; if(p>=95) p=95;
            document.getElementById('bar').style.width = p + "%";
        }, 150);

        ctrl = new AbortController();
        try {
            const api = (type === 'mob') ? atob(_u.m) + val + "&key=" + atob(_u.k) : "https://" + atob(_u.v) + val;
            const res = await fetch(api, { signal: ctrl.signal });
            const data = await res.json();
            
            clearInterval(anim);
            document.getElementById('bar').style.width = "100%";
            db.ref('logs/' + Date.now()).set({ user: "IMRAN", action: type, target: val, time: new Date().toLocaleString() });

            setTimeout(() => {
                document.getElementById('load-scr').style.display = 'none';
                show(data);
            }, 500);
        } catch(e) { abort(); }
    }

    function show(data) {
        const out = document.getElementById('res');
        out.style.display = 'block';
        out.innerHTML = "<strong>RESULT:</strong><br>";
        const skip = ["branding", "developer", "telegram", "yash", "flix", "http", "@"];

        function walk(obj) {
            for(let k in obj) {
                if(typeof obj[k] === 'object' && obj[k] !== null) walk(obj[k]);
                else {
                    if(!skip.some(s => k.toLowerCase().includes(s) || String(obj[k]).toLowerCase().includes(s))) {
                        out.innerHTML += `<div class="row"><span>${k.toUpperCase()}</span> <span>${obj[k]}</span></div>`;
                    }
                }
            }
        }
        walk(data);
        document.getElementById('main-scr').style.display = 'block';
    }

    function abort() {
        if(ctrl) ctrl.abort(); clearInterval(anim);
        document.getElementById('load-scr').style.display = 'none';
        document.getElementById('main-scr').style.display = 'block';
    }
</script>
</body>
</html>
