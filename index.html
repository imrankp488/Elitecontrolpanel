<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMRAN PLAYZ | ELITE SYSTEM v10 PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root { --p:#00ff41; --r:#ff3131; --b:#000; --panel:rgba(10,10,10,0.98); --y:#ffd700; }
body { background:var(--b); color:var(--p); font-family:'Share Tech Mono'; margin:0; }

.page { display:none; min-height:100vh; justify-content:center; align-items:center; }
.active { display:flex; }

.container {
 width:90%; max-width:450px;
 background:var(--panel);
 border:1px solid var(--p);
 border-radius:15px;
 padding:25px;
 text-align:center;
}

h1 { font-family:'Orbitron'; color:#fff; }

input {
 width:100%; padding:12px;
 margin:8px 0;
 background:#050505;
 border:1px solid #333;
 color:var(--p);
}

button {
 width:100%; padding:12px;
 margin:5px 0;
 border:1px solid var(--p);
 background:none;
 color:var(--p);
 cursor:pointer;
}
button:hover { background:var(--p); color:#000; }

.plan-card {
 border:1px solid #333;
 padding:12px;
 margin:8px 0;
 cursor:pointer;
}
.plan-card:hover { border-color:var(--p); }

.modal {
 display:none;
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.9);
 justify-content:center;
 align-items:center;
}

.modal-box {
 background:#050505;
 border:2px solid var(--p);
 padding:20px;
 text-align:center;
}
</style>
</head>

<body>

<div id="modal" class="modal">
<div class="modal-box">
<h2 id="m-title"></h2>
<p id="m-msg"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<div id="auth" class="page active">
<div class="container">
<h1 id="auth-title">SYSTEM LOGIN</h1>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="handleAuth()">Continue</button>
<button onclick="googleLogin()">Google Login</button>

<p onclick="toggleMode()" style="cursor:pointer;">Switch Mode</p>
</div>
</div>

<div id="dash" class="page">
<div class="container">
<h1>DASHBOARD</h1>

Credits: <span id="credits">0</span>

<input id="target" placeholder="Target">

<button onclick="trace()">TRACE</button>

<hr>

<div class="plan-card" onclick="selectPlan(50,10)">₹50 → 10 Credits</div>
<div class="plan-card" onclick="selectPlan(100,30)">₹100 → 30 Credits</div>

<button onclick="pay()">PAY NOW</button>

<input type="file" id="img">
<button onclick="upload()">Submit Screenshot</button>

<button onclick="logout()">Logout</button>
</div>
</div>

<script>
const firebaseConfig = {
 apiKey:"AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
 authDomain:"adminpanel-6b862.firebaseapp.com",
 databaseURL:"https://adminpanel-6b862-default-rtdb.firebaseio.com",
 projectId:"adminpanel-6b862"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

const IMGBB_KEY="47d4ddf5133629b43bb606ec944137f9";

let isLogin=true;
let selectedAmt=0;
let selectedCredits=0;

function modal(t,m){
 document.getElementById("m-title").innerText=t;
 document.getElementById("m-msg").innerText=m;
 document.getElementById("modal").style.display="flex";
}
function closeModal(){ document.getElementById("modal").style.display="none"; }

auth.onAuthStateChanged(user=>{
 if(user){
   if(!user.emailVerified){
     modal("Verification Required","Please verify your email before login.");
     auth.signOut();
     return;
   }

   db.ref("users/"+user.uid).on("value",snap=>{
     document.getElementById("credits").innerText=snap.val()?.credits||0;
   });

   show("dash");
 } else show("auth");
});

function show(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function toggleMode(){
 isLogin=!isLogin;
 document.getElementById("auth-title").innerText=isLogin?"SYSTEM LOGIN":"CREATE ACCOUNT";
}

function handleAuth(){
 let e=email.value;
 let p=pass.value;

 if(isLogin){
   auth.signInWithEmailAndPassword(e,p)
   .catch(err=>modal("Login Failed",err.message));
 } else {
   auth.createUserWithEmailAndPassword(e,p)
   .then(async res=>{
     await res.user.sendEmailVerification();

     await db.ref("users/"+res.user.uid).set({
       email:e,
       credits:1
     });

     modal("Verification Sent","Check your email and verify your account before login.");
     auth.signOut();
   })
   .catch(err=>modal("Error",err.message));
 }
}

function googleLogin(){
 const provider=new firebase.auth.GoogleAuthProvider();
 auth.signInWithPopup(provider).then(res=>{
   db.ref("users/"+res.user.uid).once("value").then(snap=>{
     if(!snap.exists()){
       db.ref("users/"+res.user.uid).set({
         email:res.user.email,
         credits:1
       });
     }
   });
 });
}

function selectPlan(a,c){
 selectedAmt=a;
 selectedCredits=c;
 modal("Plan Selected","₹"+a+" selected");
}

function pay(){
 const upi=`upi://pay?pa=imrankhan17@ptyes&pn=IMRAN&am=${selectedAmt}&cu=INR`;
 window.location.href=upi;
}

async function upload(){
 const file=document.getElementById("img").files[0];
 if(!file) return modal("Error","Select screenshot");

 const reader=new FileReader();

 reader.onloadend=async()=>{
   const base64=reader.result.split(',')[1];

   const fd=new FormData();
   fd.append("image",base64);

   const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{
     method:"POST",
     body:fd
   });

   const data=await res.json();

   if(data.success){
     const utr=prompt("Enter UTR Number");

     await db.ref("recharge_requests/"+Date.now()).set({
       user:auth.currentUser.email,
       uid:auth.currentUser.uid,
       amount:selectedAmt,
       credits:selectedCredits,
       screenshot:data.data.url,
       utr:utr||"none",
       status:"pending",
       time:new Date().toLocaleString()
     });

     modal("Success","Submitted for verification");
   }else{
     modal("Error","Upload failed");
   }
 };

 reader.readAsDataURL(file);
}

async function trace(){
 let val=target.value.trim();
 if(!val) return;

 let ref=db.ref("users/"+auth.currentUser.uid+"/credits");
 let snap=await ref.get();
 let c=snap.val()||0;

 if(c<=0) return modal("No Credits","Recharge required");

 try{
   let res=await fetch(`https://vehicle-eight-vert.vercel.app/api?rc=${val}`);
   let data=await res.json();

   if(!data || Object.keys(data).length===0){
     modal("No Data","No data found. Credit not deducted.");
     return;
   }

   await ref.set(c-1);
   modal("Success","Data fetched");
 }catch{
   modal("Error","Server issue");
 }
}

function logout(){ auth.signOut(); }
</script>

</body>
</html>
