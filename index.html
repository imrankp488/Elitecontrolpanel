<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Terminal | ImranPlayz</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #00ff41; --red: #ff3333; --bg: #000000; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier Prime', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .terminal { width: 100%; max-width: 450px; border: 2px solid var(--green); border-radius: 12px; padding: 25px; background: rgba(0, 15, 0, 0.95); box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        h1 { text-align: center; font-size: 20px; letter-spacing: 2px; text-shadow: 0 0 8px var(--green); }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--green); color: var(--green); border-radius: 5px; margin-bottom: 15px; outline: none; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; background: transparent; border: 1px solid var(--green); color: var(--green); font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:active { background: var(--green); color: #000; }
        .btn-red { border-color: var(--red); color: var(--red); width: 100%; margin-top: 15px; }
        .loader { display: none; margin: 20px 0; }
        .progress { width: 100%; height: 10px; border: 1px solid var(--green); margin-top: 10px; }
        .bar { width: 0%; height: 100%; background: var(--green); transition: 0.1s linear; }
        #result { display: none; margin-top: 20px; border: 1px dashed var(--green); padding: 10px; font-size: 13px; max-height: 250px; overflow-y: auto; }
        .row { border-bottom: 1px solid rgba(0,255,0,0.1); padding: 5px 0; }
        #login-scr { display: block; }
        #app-scr { display: none; }
    </style>
</head>
<body>

<div class="terminal">
    <div id="login-scr">
        <h1>SECURE ACCESS</h1>
        <input type="text" id="user" placeholder="OPERATOR ID">
        <input type="password" id="pass" placeholder="ACCESS KEY">
        <button style="width:100%" onclick="auth()">AUTHORIZE</button>
    </div>

    <div id="app-scr">
        <h1>SYSTEM MAIN</h1>
        <p style="text-align:center; font-size:10px;">OPERATOR: <span id="op-id"></span></p>
        <input type="text" id="target" placeholder="987654XXXX / DL10CXXXX">
        <div class="btn-grid">
            <button onclick="fetchInfo('mobile')">Number Info</button>
            <button onclick="fetchInfo('vehicle')">Vehicle Info</button>
        </div>
        <div class="loader" id="loader">
            <div id="l-text">BYPASSING...</div>
            <div class="progress"><div class="bar" id="bar"></div></div>
        </div>
        <div id="result"></div>
        <button class="btn-red" onclick="location.reload()">TERMINATE</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (APNA DATA YAHA DALO) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const USERS = { "user123": "password18", "imran": "admin786" };

    function auth() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(USERS[u] && USERS[u] === p) {
            document.getElementById('op-id').innerText = u.toUpperCase();
            document.getElementById('login-scr').style.display = 'none';
            document.getElementById('app-scr').style.display = 'block';
            db.ref('logs/' + Date.now()).set({ user: u, action: "LOGIN", time: new Date().toLocaleString() });
        } else { alert("ACCESS DENIED"); }
    }

    async function fetchInfo(type) {
        const val = document.getElementById('target').value.trim();
        if(!val) return;
        const u = document.getElementById('op-id').innerText;

        document.getElementById('result').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        let p = 0;
        const interval = setInterval(() => {
            p += 5; document.getElementById('bar').style.width = p + "%";
            if(p >= 95) clearInterval(interval);
        }, 100);

        try {
            const api = (type === 'mobile') 
                ? `https://yash-code-with-ai.alphamovies.workers.dev/?num=${val}&key=7189814021`
                : `https://vehicle-eight-vert.vercel.app/api?rc=${val}`;
            
            const res = await fetch(api);
            const data = await res.json();
            
            // Log search to Admin Panel
            db.ref('logs/' + Date.now()).set({ user: u, action: type, target: val, time: new Date().toLocaleString() });

            document.getElementById('bar').style.width = "100%";
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                showData(data);
            }, 500);
        } catch(e) { alert("API Error"); }
    }

    function showData(data) {
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        resDiv.innerHTML = "<strong>DATA FOUND:</strong><br><br>";
        const BLACKLIST = ["branding", "developer", "telegram", "yash", "flix", "http", "@"];

        function render(obj) {
            for(let k in obj) {
                if(typeof obj[k] === 'object' && obj[k] !== null) render(obj[k]);
                else {
                    let kL = k.toLowerCase();
                    let vL = String(obj[k]).toLowerCase();
                    if(!BLACKLIST.some(b => kL.includes(b) || vL.includes(b))) {
                        resDiv.innerHTML += `<div class="row"><strong>${k.toUpperCase()}:</strong> ${obj[k]}</div>`;
                    }
                }
            }
        }
        render(data);
    }
</script>
</body>
</html>
