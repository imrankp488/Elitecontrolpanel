<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMRAN PLAYZ | ELITE SYSTEM v9.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --r: #ff3131; --b: #000; --panel: rgba(10, 10, 10, 0.98); --y: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: 0.3s ease; }
        body { background: var(--b); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; overflow-x: hidden; }
        
        .page { display: none; min-height: 100vh; width: 100%; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex !important; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .container { width: 100%; max-width: 450px; background: var(--panel); border: 1px solid var(--p); border-radius: 15px; padding: 30px; box-shadow: 0 0 25px rgba(0, 255, 65, 0.15); text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 18px; letter-spacing: 2px; margin-bottom: 25px; color: #fff; text-shadow: 0 0 10px var(--p); }
        
        input { width: 100%; padding: 14px; background: #050505; border: 1px solid #333; color: var(--p); border-radius: 8px; margin-bottom: 15px; outline: none; font-size: 16px; font-family: inherit; }
        button { width: 100%; padding: 14px; background: transparent; border: 1.5px solid var(--p); color: var(--p); font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 8px; font-family: inherit; margin-bottom: 10px; }
        button:hover { background: var(--p); color: #000; box-shadow: 0 0 15px var(--p); }
        .btn-google { background: #fff; color: #000; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-red { border-color: var(--r); color: var(--r); }
        .btn-gold { border-color: var(--y); color: var(--y); }

        /* Credits Badge */
        .credit-badge { background: rgba(0, 255, 65, 0.1); border: 1px solid var(--p); padding: 5px 15px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 20px; color: var(--y); }

        /* Plans UI */
        .plan-card { border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: left; cursor: pointer; }
        .plan-card:hover { border-color: var(--p); background: rgba(0,255,0,0.05); }
        .plan-price { float: right; color: #fff; font-weight: bold; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { width: 90%; max-width: 400px; background: #050505; border: 2px solid var(--p); border-radius: 15px; padding: 30px; text-align: center; }

        /* Progress Bar */
        .bar-bg { width: 100%; height: 10px; background: #111; border: 1px solid var(--p); border-radius: 5px; margin: 20px 0; }
        .bar-f { width: 0%; height: 100%; background: var(--p); transition: 0.2s; }
        
        .data-vault { width: 100%; text-align: left; background: #050505; border: 1px dashed var(--p); padding: 15px; max-height: 350px; overflow-y: auto; }
        .row { border-bottom: 1px solid rgba(0,255,0,0.1); padding: 8px 0; display: flex; justify-content: space-between; font-size: 12px; }
    </style>
</head>
<body>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modal-title" style="color:#fff; font-family:'Orbitron';">Title</h2>
            <p id="modal-msg" style="font-size:14px; margin-bottom:20px;"></p>
            <div id="modal-content"></div>
            <button onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <div id="pg-auth" class="page active">
        <div class="container">
            <h1>SYSTEM LOGIN</h1>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="handleAuth()">Access System</button>
            <button class="btn-google" onclick="loginGoogle()">
                <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="20"> Sign in with Google
            </button>
            <p style="margin-top: 20px;">
                <span style="color: #555; font-size: 12px; cursor: pointer; text-decoration: underline;" id="toggle-txt" onclick="toggleMode()">New Operator? Register</span>
            </p>
            <p id="auth-err" style="color:var(--r); font-size:10px;"></p>
        </div>
    </div>

    <div id="pg-dash" class="page">
        <div class="container">
            <h1>ELITE DASHBOARD</h1>
            <div class="credit-badge">CREDITS: <span id="user-credits">0</span></div>
            <p style="font-size: 10px;">OPERATOR: <span id="op-name" style="color:#fff;"></span></p>
            
            <input type="text" id="target" placeholder="ENTER TARGET ID">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="checkCreditsAndTrace('mob')">Trace Mobile</button>
                <button onclick="checkCreditsAndTrace('veh')">Trace Vehicle</button>
            </div>
            
            <button class="btn-gold" style="margin-top:15px;" onclick="switchPage('pg-plans')">Buy Credits / Recharge</button>
            <button class="btn-red" style="margin-top:10px;" onclick="location.reload()">Terminate Session</button>
        </div>
    </div>

    <div id="pg-plans" class="page">
        <div class="container">
            <h1>SELECT RECHARGE PLAN</h1>
            <div class="plan-card" onclick="startPay(50, 10)">
                <span class="plan-price">₹50</span>
                <strong>BASIC PLAN</strong><br><small>10 High-Speed Searches</small>
            </div>
            <div class="plan-card" onclick="startPay(100, 30)">
                <span class="plan-price">₹100</span>
                <strong>PRO PLAN</strong><br><small>30 High-Speed Searches</small>
            </div>
            <div class="plan-card" onclick="startPay(200, 100)">
                <span class="plan-price">₹200</span>
                <strong>ELITE PLAN</strong><br><small>100 High-Speed Searches</small>
            </div>
            <button class="btn-red" onclick="switchPage('pg-dash')">BACK TO DASHBOARD</button>
        </div>
    </div>

    <div id="pg-load" class="page">
        <div class="container" style="border:none; background:transparent;">
            <h1 id="l-stat">BYPASSING...</h1>
            <div class="bar-bg"><div id="bar" class="bar-f"></div></div>
            <p style="font-size: 10px;">> ACCESSING SECURE NODE...</p>
        </div>
    </div>

    <div id="pg-res" class="page">
        <div class="container" style="max-width: 600px;">
            <h1>DECRYPTED DATA</h1>
            <div id="data-out" class="data-vault"></div>
            <button style="margin-top: 20px;" onclick="switchPage('pg-dash')">New Search</button>
        </div>
    </div>

<script>
    // --- 🔑 FIREBASE SETUP (APNI KEYS DALO) ---
    const firebaseConfig = {
      apiKey: "AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
      authDomain: "adminpanel-6b862.firebaseapp.com",
      databaseURL: "https://adminpanel-6b862-default-rtdb.firebaseio.com",
      projectId: "adminpanel-6b862",
      storageBucket: "adminpanel-6b862.firebasestorage.app",
      messagingSenderId: "220057098294",
      appId: "1:220057098294:web:9453e948e8817544916097"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const provider = new firebase.auth.GoogleAuthProvider();

    let isLogin = true;
    let currentUserCredits = 0;

    // --- 🛡️ MODAL & UI LOGIC ---
    function showModal(title, msg) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- 🔐 AUTH LOGIC ---
    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "SYSTEM LOGIN" : "CREATE ACCOUNT";
        document.getElementById('toggle-txt').innerText = isLogin ? "New Operator? Register" : "Back to Login";
    }

    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(isLogin) {
            auth.signInWithEmailAndPassword(e, p).then(res => syncUser(res.user))
                .catch(err => document.getElementById('auth-err').innerText = err.message);
        } else {
            auth.createUserWithEmailAndPassword(e, p).then(res => {
                db.ref('users/' + res.user.uid).set({ email: e, credits: 1 }); // 1 Free Search
                alert("Registered! 1 Free Credit Added.");
                location.reload();
            });
        }
    }

    function loginGoogle() {
        auth.signInWithPopup(provider).then(res => syncUser(res.user));
    }

    function syncUser(user) {
        db.ref('users/' + user.uid).on('value', snap => {
            const data = snap.val();
            if(!data) {
                db.ref('users/' + user.uid).set({ email: user.email, credits: 1 });
                currentUserCredits = 1;
            } else {
                currentUserCredits = data.credits || 0;
            }
            document.getElementById('user-credits').innerText = currentUserCredits;
            document.getElementById('op-name').innerText = user.email;
            switchPage('pg-dash');
        });
    }

    // --- 💳 PAYMENT LOGIC ---
    function startPay(amount, credits) {
        // Professional UPI Deep Link
        const upiID = "imranplayz@upi"; // APNA UPI ID YAHA DALO
        const upiUrl = `upi://pay?pa=${upiID}&pn=IMRAN_PLAYZ&am=${amount}&tn=Credits_Recharge`;
        
        showModal("PAYMENT INITIATED", `1. Pay ₹${amount} via UPI App.\n2. After payment, copy Transaction ID (UTR).\n3. Send UTR to Admin for instant activation.`);
        
        // Mobile par direct app kholne ke liye
        if(/Android|iPhone/i.test(navigator.userAgent)) {
            window.location.href = upiUrl;
        }
    }

    // --- 🛠️ TRACE LOGIC ---
    async function checkCreditsAndTrace(type) {
        if(currentUserCredits <= 0) {
            showModal("ZERO CREDITS", "Please recharge your account to continue tracing.");
            return;
        }

        const val = document.getElementById('target').value.trim();
        if(!val) return;

        switchPage('pg-load');
        animateBar();

        try {
            const api = (type === 'mob') 
                ? `https://yash-code-with-ai.alphamovies.workers.dev/?num=${val}&key=7189814021`
                : `https://vehicle-eight-vert.vercel.app/api?rc=${val}`;
            
            const res = await fetch(api);
            const data = await res.json();
            
            // Deduct Credit
            await db.ref('users/' + auth.currentUser.uid).update({ credits: currentUserCredits - 1 });
            
            db.ref('logs/' + Date.now()).set({ user: auth.currentUser.email, target: val, time: new Date().toLocaleString() });

            setTimeout(() => {
                switchPage('pg-res');
                renderData(data);
            }, 600);
        } catch(e) { switchPage('pg-dash'); }
    }

    function animateBar() {
        let p = 0; const b = document.getElementById('bar');
        const itv = setInterval(() => { p += 5; b.style.width = p + "%"; if(p >= 100) clearInterval(itv); }, 100);
    }

    function renderData(data) {
        const out = document.getElementById('data-out'); out.innerHTML = "";
        const skip = ["branding", "developer", "telegram", "yash", "flix", "http"];
        function walk(obj) {
            for(let k in obj) {
                if(typeof obj[k] === 'object' && obj[k] !== null) walk(obj[k]);
                else if(!skip.some(s => k.toLowerCase().includes(s))) {
                    out.innerHTML += `<div class="row"><span>${k.toUpperCase()}</span> <span>${obj[k]}</span></div>`;
                }
            }
        }
        walk(data);
    }
</script>
</body>
</html>
