<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMRAN PLAYZ | ELITE SYSTEM v18.2</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --r: #ff3131; --b: #000; --panel: rgba(10, 10, 10, 0.98); --blue: #00ccff; --y: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: 0.3s ease; }
        body { background: var(--b); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; overflow-x: hidden; }
        .page { display: none; min-height: 100vh; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex !important; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .container { width: 100%; max-width: 450px; background: var(--panel); border: 1px solid var(--p); border-radius: 15px; padding: 25px; box-shadow: 0 0 25px rgba(0, 255, 65, 0.15); text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff; text-shadow: 0 0 10px var(--p); margin-bottom: 20px; }
        input { width: 100%; padding: 14px; background: #050505; border: 1px solid #333; color: var(--p); border-radius: 8px; margin-bottom: 12px; outline: none; }
        button { width: 100%; padding: 14px; background: transparent; border: 1.5px solid var(--p); color: var(--p); font-weight: bold; cursor: pointer; border-radius: 8px; margin-bottom: 10px; }
        button:hover { background: var(--p); color: #000; }
        .btn-blue { border-color: var(--blue); color: var(--blue); }
        .btn-red { border-color: var(--r); color: var(--r); }
        .credit-badge { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--y); padding: 6px 15px; border-radius: 20px; font-size: 13px; margin-bottom: 20px; color: var(--y); display: inline-block; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { width: 85%; max-width: 380px; background: #050505; border: 2px solid var(--p); border-radius: 15px; padding: 25px; text-align: center; }
        .modal-box.error { border-color: var(--r); }
        .modal-box.error h2 { color: var(--r); }
        .plan-card { border: 2px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 12px; text-align: left; cursor: pointer; }
        .plan-card.selected { border-color: var(--p); box-shadow: 0 0 15px var(--p); background: rgba(0,255,65,0.08); }
        .request-card { background: #111; border: 1px solid #444; border-radius: 10px; padding: 12px; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>

<div id="modal" class="modal-overlay">
    <div class="modal-box" id="modal-box">
        <h2 id="m-t"></h2>
        <p id="m-m" style="font-size:13px; color:#ccc; line-height:1.5;"></p>
        <button onclick="closeModal()">OKAY</button>
    </div>
</div>

<!-- AUTH -->
<div id="pg-auth" class="page active">
    <div class="container">
        <h1>SYSTEM LOGIN</h1>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleAuth()">LOGIN</button>
        <button style="background:#fff; color:#000; border:none;" onclick="loginGoogle()">SIGN IN WITH GOOGLE</button>
        <p onclick="toggleMode()" style="font-size:11px; color:#444; cursor:pointer; margin-top:10px;">New User? Create Account</p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="pg-dash" class="page">
    <div class="container">
        <h1>DASHBOARD</h1>
        <div class="credit-badge">CREDITS: <span id="user-credits">0</span></div>
        <input type="text" id="target" placeholder="98765XXXXX / MH12XXXX">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <button onclick="runTrace('mob')">Mobile</button>
            <button onclick="runTrace('veh')">Vehicle</button>
        </div>
        <button onclick="switchPage('pg-history'); loadHistory()" class="btn-blue">VIEW SEARCH HISTORY</button>
        <button class="btn-blue" onclick="switchPage('pg-plans')">RECHARGE / PLANS</button>
        <button onclick="enterAdmin()" class="btn-blue">🔧 ADMIN PANEL</button>
        <button class="btn-red" onclick="auth.signOut().then(()=>location.reload())">LOGOUT</button>
    </div>
</div>

<!-- PLANS -->
<div id="pg-plans" class="page">
    <div class="container">
        <h1>RECHARGE</h1>
        <div id="plan-basic" class="plan-card" onclick="selectPlan(50,'BASIC')"> <span style="float:right;color:var(--p);">₹50</span><strong>BASIC</strong><br><small>10 Searches</small></div>
        <div id="plan-pro" class="plan-card" onclick="selectPlan(100,'PRO')"> <span style="float:right;color:var(--p);">₹100</span><strong>PRO</strong><br><small>30 Searches</small></div>
        <div id="plan-unlimited" class="plan-card" onclick="selectPlan(399,'UNLIMITED')"> <span style="float:right;color:var(--p);">₹399</span><strong>UNLIMITED 28 DAYS</strong><br><small>Unlimited Searches</small></div>

        <div id="confirm-section" style="display:none; margin:20px 0; padding:15px; border:2px solid var(--p); border-radius:12px; background:rgba(0,255,65,0.05);">
            <p id="selected-plan"></p>
            <button onclick="confirmAndPay()" class="btn-blue">CONFIRM & PAY VIA UPI</button>
        </div>

        <div style="margin-top:25px;border-top:1px solid #333;padding-top:20px;">
            <p style="font-size:11px;color:var(--blue);">ALREADY PAID? UPLOAD SCREENSHOT</p>
            <div class="upload-box">
                <span id="fn">Select Image</span>
                <input type="file" id="p-img" accept="image/*">
            </div>
            <button class="btn-blue" id="up-btn" onclick="uploadImgBB()">SUBMIT PROOF</button>
        </div>
        <button class="btn-red" onclick="switchPage('pg-dash'); resetPlans()">BACK</button>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="pg-admin" class="page">
    <div class="container">
        <h1>🔧 ADMIN DASHBOARD</h1>
        <button onclick="loadPendingRequests()" class="btn-blue">Refresh Pending Requests</button>
        <div id="pending-list"></div>

        <h2 style="margin:25px 0 10px;">Manual Credit Add</h2>
        <input type="text" id="manual-uid" placeholder="User UID or Email">
        <input type="number" id="manual-credits" value="10" placeholder="Credits">
        <button onclick="addManualCredits()" class="btn-blue">ADD CREDITS</button>

        <button onclick="switchPage('pg-dash')" class="btn-red">BACK</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey:"AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
    authDomain:"adminpanel-6b862.firebaseapp.com",
    databaseURL:"https://adminpanel-6b862-default-rtdb.firebaseio.com",
    projectId:"adminpanel-6b862"

const IMGBB_KEY="47d4ddf5133629b43bb606ec944137f9";
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.database();

let credits=0, isLogin=true;
let selectedPlan = null;

// Strong Admin Password (obfuscated a bit)
const ADMIN_PASS = "@admin-panel786";

function obfuscatedCheck(input) {
    return input === ADMIN_PASS;
}

auth.onAuthStateChanged(user => { if(user) sync(user); else switchPage('pg-auth'); });

function showModal(t, m, err=false) {
    const box = document.getElementById('modal-box');
    document.getElementById('m-t').innerText = t;
    document.getElementById('m-m').innerText = m;
    box.classList.toggle('error', err);
    document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function switchPage(id) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ================== ADMIN ENTRY ==================
function enterAdmin() {
    const pass = prompt("Enter Admin Password:");
    if (!pass) return;
    
    if (obfuscatedCheck(pass)) {
        switchPage('pg-admin');
        loadPendingRequests();
    } else {
        alert("❌ Wrong Password! Access Denied.");
    }
}

// ================== ADMIN FUNCTIONS ==================
async function loadPendingRequests() {
    const list = document.getElementById('pending-list');
    list.innerHTML = '<p style="text-align:center;color:#666;">Loading...</p>';

    db.ref('recharge_requests').orderByKey().limitToLast(30).once('value', snap => {
        list.innerHTML = '';
        let hasPending = false;
        snap.forEach(child => {
            const r = child.val();
            if (r.status === "pending") {
                hasPending = true;
                const div = document.createElement('div');
                div.className = 'request-card';
                div.innerHTML = `
                    <small>${r.time || ''} • ${r.user}</small><br>
                    <strong>UID:</strong> ${r.uid}<br><br>
                    <img src="${r.screenshot}" style="max-width:100%; border-radius:8px;"><br><br>
                    <input type="number" id="cred-${child.key}" value="10" style="width:100%; padding:10px; margin:8px 0;">
                    <button onclick="approveRequest('${child.key}', '${r.uid}', document.getElementById('cred-${child.key}').value)" style="background:#0f0; color:#000; border:none;">✅ APPROVE & ADD CREDITS</button>
                `;
                list.appendChild(div);
            }
        });
        if (!hasPending) list.innerHTML = '<p style="color:#0f0; text-align:center;">No pending requests right now.</p>';
    });
}

async function approveRequest(key, uid, amount) {
    amount = parseInt(amount);
    if (!amount) return alert("Enter valid credits");

    try {
        const ref = db.ref('users/' + uid);
        const snap = await ref.once('value');
        const curr = snap.val()?.credits || 0;
        await ref.update({ credits: curr + amount });

        await db.ref('recharge_requests/' + key).update({
            status: "approved",
            credits_added: amount,
            approved_at: new Date().toLocaleString()
        });

        showModal("SUCCESS", `${amount} credits added to user!`, false);
        loadPendingRequests();
    } catch(e) {
        showModal("ERROR", "Failed to update credits", true);
    }
}

async function addManualCredits() {
    const input = document.getElementById('manual-uid').value.trim();
    const amt = parseInt(document.getElementById('manual-credits').value);
    if (!input || !amt) return alert("Please fill both fields");

    try {
        let uid = input;
        if (input.includes('@')) {
            const snap = await db.ref('users').once('value');
            snap.forEach(c => { if (c.val().email === input) uid = c.key; });
        }
        const ref = db.ref('users/' + uid);
        const snap = await ref.once('value');
        const curr = snap.val()?.credits || 0;
        await ref.update({ credits: curr + amt });
        showModal("SUCCESS", `${amt} credits added successfully!`, false);
    } catch(e) {
        showModal("ERROR", "User not found or error occurred", true);
    }
}
