<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL v3.0 | IMRANPLAYZ</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff; /* Cyan Neon */
            --bg: #0a0b10;
            --glass: rgba(15, 20, 30, 0.8);
            --border: rgba(0, 242, 255, 0.3);
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            margin: 0; padding: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1b26 0%, #0a0b10 100%);
        }

        /* Scanline Effect */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .container {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px; z-index: 5; position: relative;
        }

        .panel {
            width: 100%; max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            text-align: center;
        }

        h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; text-shadow: 0 0 10px var(--primary); }

        .input-group { position: relative; margin-bottom: 20px; }

        input {
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--primary); outline: none; transition: 0.3s;
            box-sizing: border-box; font-size: 16px;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        button {
            width: 100%; padding: 15px; margin-top: 10px;
            background: transparent; border: 1px solid var(--primary);
            color: var(--primary); font-weight: bold; border-radius: 10px;
            cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px;
        }

        button:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        .footer { margin-top: 30px; font-size: 10px; opacity: 0.6; color: #fff; }

        /* Results Display */
        .res-box { text-align: left; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin-top: 20px; border-left: 4px solid var(--primary); font-size: 13px; max-height: 300px; overflow-y: auto; }

        #loginSection, #mainSection, #loadSection, #resSection { display: none; }
        .active { display: block !important; }

        .status-dot { height: 10px; width: 10px; background-color: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel active" id="loginSection">
        <h1>Authorize</h1>
        <div class="input-group">
            <input type="text" id="user" placeholder="OPERATOR ID">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="ACCESS KEY">
        </div>
        <button onclick="authLogin()">Initialize Session</button>
        <p id="loginError" style="color:#ff4444; font-size:12px; margin-top:15px; display:none;">ACCESS DENIED: INVALID CREDENTIALS</p>
    </div>

    <div class="panel" id="mainSection">
        <div style="font-size: 10px; text-align: right; margin-bottom: 10px;">
            <span class="status-dot"></span> SYSTEM ONLINE: <span id="activeUser"></span>
        </div>
        <h1>Command Center</h1>
        <input type="text" id="target" placeholder="MOBILE / VEHICLE NUMBER">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="processData('mobile')" style="font-size: 12px;">Trace Number</button>
            <button onclick="processData('vehicle')" style="font-size: 12px;">Check RC</button>
        </div>
        <button onclick="location.reload()" style="border-color: #ff4444; color: #ff4444; margin-top: 20px;">Disconnect</button>
    </div>

    <div class="panel" id="loadSection">
        <h1 id="loadText">Bypassing...</h1>
        <div style="width: 100%; height: 4px; background: #1a1b26; border-radius: 2px;">
            <div id="progBar" style="width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary);"></div>
        </div>
    </div>

    <div class="panel" id="resSection">
        <h1>Data Extracted</h1>
        <div id="resData" class="res-box"></div>
        <button onclick="switchPage('mainSection')">New Request</button>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION (FIREBASE SETUP) ---
    // Google Firebase par project banake apna config yahan paste karein
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };
    
    // Initialize Firebase (sirf tab jab aapke paas config ho)
    // firebase.initializeApp(firebaseConfig);
    // const db = firebase.database();

    // --- 2. AUTH LOGIC ---
    const USERS = { "admin": "imran786", "user123": "pass18" };

    function authLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const deviceID = navigator.userAgent.replace(/\D/g, '').slice(0, 10); // Simple fingerprint

        if(USERS[u] && USERS[u] === p) {
            document.getElementById('activeUser').innerText = u;
            switchPage('mainSection');
            // Activity log for login
            logToFirebase(u, "LOGIN", deviceID);
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    // --- 3. DATA PROCESSING ---
    async function processData(type) {
        const val = document.getElementById('target').value;
        if(!val) return;

        switchPage('loadSection');
        let p = 0;
        const bar = document.getElementById('progBar');
        const loadTxt = document.getElementById('loadText');
        
        const timer = setInterval(() => {
            p += 5; bar.style.width = p + "%";
            if(p > 40) loadTxt.innerText = "Extracting...";
            if(p > 80) loadTxt.innerText = "Decrypting...";
            if(p >= 100) clearInterval(timer);
        }, 100);

        try {
            let url = (type === 'mobile') 
                ? `https://yash-code-with-ai.alphamovies.workers.dev/?num=${val}&key=7189814021`
                : `https://vehicle-eight-vert.vercel.app/api?rc=${val}`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            // Log search activity
            logToFirebase(document.getElementById('activeUser').innerText, type, val);
            
            displayRes(data);
        } catch(e) {
            alert("Connection Failed!");
            switchPage('mainSection');
        }
    }

    function displayRes(data) {
        const box = document.getElementById('resData');
        box.innerHTML = "";
        
        function extract(o) {
            for(let k in o) {
                if(typeof o[k] === 'object' && o[k] !== null) extract(o[k]);
                else box.innerHTML += `<div><strong>${k.toUpperCase()}:</strong> ${o[k]}</div><br>`;
            }
        }
        extract(data);
        switchPage('resSection');
    }

    function switchPage(id) {
        ['loginSection', 'mainSection', 'loadSection', 'resSection'].forEach(s => {
            document.getElementById(s).classList.remove('active');
        });
        document.getElementById(id).classList.add('active');
    }

    function logToFirebase(user, action, target) {
        console.log(`LOG: ${user} | ${action} | ${target}`);
        // Agar Firebase setup hai toh:
        // db.ref('logs/' + Date.now()).set({ user, action, target, time: new Date().toLocaleString() });
    }
</script>
</body>
</html>
