<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMRAN PLAYZ | ELITE SYSTEM v18.4</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --r: #ff3131; --b: #000; --panel: rgba(10, 10, 10, 0.98); --blue: #00ccff; --y: #ffd700; }
        * { box-sizing: border-box; transition: 0.3s ease; }
        body { background: var(--b); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; }
        .page { display: none; min-height: 100vh; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex !important; }
        .container { width: 100%; max-width: 450px; background: var(--panel); border: 1px solid var(--p); border-radius: 15px; padding: 25px; text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff; text-shadow: 0 0 10px var(--p); }
        button { width: 100%; padding: 14px; background: transparent; border: 1.5px solid var(--p); color: var(--p); font-weight: bold; border-radius: 8px; margin: 8px 0; }
        button:hover { background: var(--p); color: #000; }
        .btn-blue { border-color: var(--blue); color: var(--blue); }
        .btn-red { border-color: var(--r); color: var(--r); }
        .modal-box.error { border-color: var(--r); }
    </style>
</head>
<body>

<div id="modal" class="modal-overlay">
    <div class="modal-box" id="modal-box">
        <h2 id="m-t"></h2>
        <p id="m-m" style="font-size:13px; color:#ccc;"></p>
        <button onclick="closeModal()">OKAY</button>
    </div>
</div>

<div id="pg-auth" class="page active">
    <div class="container">
        <h1>SYSTEM LOGIN</h1>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleAuth()">LOGIN</button>
        <button style="background:#fff; color:#000; border:none;" onclick="loginGoogle()">SIGN IN WITH GOOGLE</button>
        <p onclick="toggleMode()" style="font-size:11px; color:#444; cursor:pointer; margin-top:10px;">New User? Create Account</p>
    </div>
</div>

<!-- Baaki pages (pg-dash, pg-plans, pg-history, pg-admin) ko apne purane code se copy kar lo. Sirf Google login wala hissa change hua hai. -->

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
    authDomain: "adminpanel-6b862.firebaseapp.com",
    databaseURL: "https://adminpanel-6b862-default-rtdb.firebaseio.com",
    projectId: "adminpanel-6b862"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let credits = 0;

// Strong onAuthStateChanged - har page load pe check karega
auth.onAuthStateChanged(user => {
    if (user) {
        syncUser(user);
    } else {
        switchPage('pg-auth');
    }
});

function syncUser(user) {
    db.ref('users/' + user.uid).on('value', snap => {
        const data = snap.val() || {};
        credits = data.credits || 0;
        document.getElementById('user-credits').innerText = credits;
        switchPage('pg-dash');
    });
}

async function loginGoogle() {
    showModal("GOOGLE SIGN IN", "Opening Google sign in...", false);

    try {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        const result = await auth.signInWithPopup(provider);
        
        // New user ke liye entry banao
        const uid = result.user.uid;
        const userRef = db.ref('users/' + uid);
        const snap = await userRef.once('value');
        
        if (!snap.exists()) {
            await userRef.set({
                email: result.user.email,
                credits: 5,   // starting credits
                createdAt: new Date().toLocaleString()
            });
        }

        closeModal();
        // onAuthStateChanged automatically dashboard pe le jayega

    } catch (error) {
        closeModal();
        console.error("Google Login Error:", error.code, error.message);

        let msg = "Google sign in failed. Please try again.";

        if (error.code === 'auth/popup-blocked') {
            msg = "Popup blocked by browser.\nAllow popups for this site and try again.\n\nIf still not working, use Email/Password login.";
        } else if (error.code === 'auth/popup-closed-by-user') {
            msg = "You closed the popup. Please try again.";
        } else if (error.code === 'auth/unauthorized-domain') {
            msg = "Domain not authorized in Firebase Console.";
        } else if (error.code === 'auth/network-request-failed') {
            msg = "Network error. Check your internet.";
        }

        showModal("GOOGLE SIGN IN FAILED", msg, true);
    }
}

// Other functions (handleAuth, switchPage, showModal, closeModal, plans, upload, admin panel etc.) 
// apne purane code se copy kar lo. Sirf loginGoogle wala part replace kar diya hai.

function showModal(title, message, isError = false) {
    const box = document.getElementById('modal-box');
    document.getElementById('m-t').innerText = title;
    document.getElementById('m-m').innerText = message;
    box.classList.toggle('error', isError);
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

function switchPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
