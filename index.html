<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMRAN PLAYZ | ELITE SYSTEM v15.0</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root { --p:#00ff41; --b:#000; --panel:#0a0a0a; }
body { background:var(--b); color:var(--p); font-family:'Share Tech Mono'; margin:0; }

.page{display:none; min-height:100vh; align-items:center; justify-content:center;}
.active{display:flex;}

.container{width:90%; max-width:420px; background:var(--panel); padding:25px; border-radius:12px; text-align:center;}

input,button{width:100%; padding:12px; margin:6px 0;}
button{border:1px solid var(--p); background:transparent; color:var(--p);}

.bar-bg{height:8px; background:#111; margin:10px 0;}
.bar-f{height:100%; width:0%; background:var(--p); transition:0.2s;}

.data-box{background:#050505; padding:10px; border:1px dashed var(--p); text-align:left;}
.row{padding:6px 0; border-bottom:1px solid #111; display:flex; justify-content:space-between;}
</style>
</head>

<body>

<div id="pg-auth" class="page active">
<div class="container">
<h2>LOGIN</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="google()">Google Login</button>
</div>
</div>

<div id="pg-dash" class="page">
<div class="container">
<h2>DASHBOARD</h2>
Credits: <span id="credits">0</span>
<input id="target" placeholder="Enter Target">
<button onclick="runTrace()">Search</button>
</div>
</div>

<div id="pg-load" class="page">
<div class="container">
<h2>Processing...</h2>
<div class="bar-bg"><div id="bar" class="bar-f"></div></div>
</div>
</div>

<div id="pg-res" class="page">
<div class="container">
<h2>RESULT</h2>
<div id="out" class="data-box"></div>
<button onclick="goDash()">Back</button>
</div>
</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyB011W...",
authDomain:"adminpanel-6b862.firebaseapp.com",
databaseURL:"https://adminpanel-6b862-default-rtdb.firebaseio.com",
projectId:"adminpanel-6b862"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function switchPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// ✅ LOGIN FIX (persistent)
auth.onAuthStateChanged(user=>{
if(user){
db.ref('users/'+user.uid).once('value').then(snap=>{
let d=snap.val();
if(!d){
db.ref('users/'+user.uid).set({credits:1});
d={credits:1};
}
document.getElementById('credits').innerText=d.credits;
switchPage('pg-dash');
});
}else{
switchPage('pg-auth');
}
});

function login(){
auth.signInWithEmailAndPassword(
email.value, pass.value
).catch(e=>alert(e.message));
}

function google(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

// ✅ PROGRESS BAR FIX
function animateBar(){
let p=0;
const bar=document.getElementById('bar');
const int=setInterval(()=>{
p+=5;
bar.style.width=p+"%";
if(p>=100) clearInterval(int);
},100);
}

async function runTrace(){
const val=target.value.trim();
if(!val) return;

switchPage('pg-load');
animateBar();

try{
const res=await fetch(`https://yash-code-with-ai.alphamovies.workers.dev/?num=${val}&key=7189814021`);
const data=await res.json();

setTimeout(()=>{
switchPage('pg-res');
render(data);
},800);

}catch(e){
alert("API Error");
switchPage('pg-dash');
}
}

// ✅ CLEAN OUTPUT (no branding)
function render(data){
const out=document.getElementById('out');
out.innerHTML="";

const skip=["branding","developer","processed_by","owner_contact"];

for(let k in data){
if(typeof data[k]!=="object" && !skip.includes(k)){
out.innerHTML+=`
<div class="row">
<span>${k.toUpperCase()}</span>
<span>${data[k]}</span>
</div>`;
}
}
}

function goDash(){
switchPage('pg-dash');
}
</script>

</body>
</html>
