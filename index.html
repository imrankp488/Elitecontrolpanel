<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMRAN PLAYZ | ELITE SYSTEM v8.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --r: #ff3131; --b: #000; --panel: rgba(10, 10, 10, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: 0.3s ease; }
        body { background: var(--b); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; overflow-x: hidden; }
        
        .page { display: none; min-height: 100vh; width: 100%; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex !important; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .container { width: 100%; max-width: 450px; background: var(--panel); border: 1px solid var(--p); border-radius: 15px; padding: 30px; box-shadow: 0 0 25px rgba(0, 255, 65, 0.15); text-align: center; position: relative; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 2px; margin-bottom: 25px; color: #fff; text-shadow: 0 0 10px var(--p); }
        
        input { width: 100%; padding: 14px; background: #050505; border: 1px solid #333; color: var(--p); border-radius: 8px; margin-bottom: 15px; outline: none; font-size: 16px; font-family: inherit; }
        input:focus { border-color: var(--p); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        
        button { width: 100%; padding: 14px; background: transparent; border: 1.5px solid var(--p); color: var(--p); font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 8px; font-family: inherit; margin-bottom: 10px; }
        button:hover { background: var(--p); color: #000; box-shadow: 0 0 15px var(--p); }
        .btn-google { background: #fff; color: #000; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-red { border-color: var(--r); color: var(--r); }
        .btn-red:hover { background: var(--r); color: #000; box-shadow: 0 0 15px var(--r); }

        /* --- 🛡️ CUSTOM MODAL STYLES --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { width: 90%; max-width: 400px; background: #050505; border: 2px solid var(--p); border-radius: 15px; padding: 30px; text-align: center; box-shadow: 0 0 30px var(--p); animation: zoomIn 0.3s; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-box h2 { color: #fff; font-family: 'Orbitron', sans-serif; font-size: 18px; margin-bottom: 15px; }
        .modal-box p { font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 25px; }

        /* Dashboard & Results */
        .bar-bg { width: 100%; height: 12px; background: #111; border: 1px solid var(--p); border-radius: 6px; overflow: hidden; margin: 20px 0; }
        .bar-f { width: 0%; height: 100%; background: var(--p); box-shadow: 0 0 15px var(--p); }
        .data-vault { width: 100%; text-align: left; background: #050505; border: 1px dashed var(--p); padding: 15px; max-height: 350px; overflow-y: auto; }
        .row { border-bottom: 1px solid rgba(0,255,0,0.1); padding: 10px 0; display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modal-icon" style="font-size: 40px; margin-bottom: 15px;">📧</div>
            <h2 id="modal-title">Verification Sent</h2>
            <p id="modal-msg">Check your email and click the link to verify your account.</p>
            <button id="modal-btn" onclick="closeModal()">GO TO LOGIN</button>
        </div>
    </div>

    <div id="pg-auth" class="page active">
        <div class="container">
            <h1 id="auth-title">SYSTEM LOGIN</h1>
            <p id="auth-sub" style="font-size: 11px; color: #666; margin-bottom: 25px;">RESTRICTED AREA</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button id="auth-main-btn" onclick="handleAuth()">Authorize Access</button>
            <div id="g-wrap">
                <div style="margin: 10px 0; color: #444; font-size: 11px;">EXTERNAL LOGINS</div>
                <button class="btn-google" onclick="loginGoogle()">
                    <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="20"> Sign in with Google
                </button>
            </div>
            <p style="margin-top: 20px;">
                <span style="color: #555; font-size: 12px; cursor: pointer; text-decoration: underline;" id="toggle-txt" onclick="toggleMode()">New Operator? Create Account</span>
            </p>
            <p id="auth-err" style="color:var(--r); font-size:10px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="pg-dash" class="page">
        <div class="container">
            <h1>COMMAND CENTER</h1>
            <p style="font-size: 11px; margin-bottom: 20px;">OP: <span id="op-name" style="color:#fff;"></span></p>
            <input type="text" id="target" placeholder="NUMBER / VEHICLE RC">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="startTrace('mob')">Trace Number</button>
                <button onclick="startTrace('veh')">Trace Vehicle</button>
            </div>
            <button class="btn-red" style="margin-top:20px;" onclick="location.reload()">Terminate Session</button>
        </div>
    </div>

    <div id="pg-load" class="page">
        <div class="container" style="border:none; background:transparent;">
            <h1 id="l-stat">INITIALIZING...</h1>
            <div class="bar-bg"><div id="bar" class="bar-f"></div></div>
            <p style="font-size: 10px; color: #008800;">> Bypassing security protocols...</p>
        </div>
    </div>

    <div id="pg-res" class="page">
        <div class="container" style="max-width: 600px;">
            <h1>DATA DECRYPTED</h1>
            <div id="data-out" class="data-vault"></div>
            <button style="margin-top: 20px;" onclick="switchPage('pg-dash')">New Query</button>
        </div>
    </div>

<script>
    // --- 🔑 FIREBASE SETUP ---
    const firebaseConfig = {
      apiKey: "AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
      authDomain: "adminpanel-6b862.firebaseapp.com",
      databaseURL: "https://adminpanel-6b862-default-rtdb.firebaseio.com",
      projectId: "adminpanel-6b862",
      storageBucket: "adminpanel-6b862.firebasestorage.app",
      messagingSenderId: "220057098294",
      appId: "1:220057098294:web:9453e948e8817544916097"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const provider = new firebase.auth.GoogleAuthProvider();

    let isLogin = true;

    // --- 🛡️ MODAL LOGIC ---
    function showModal(title, msg, icon, btnTxt) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        document.getElementById('modal-icon').innerText = icon;
        document.getElementById('modal-btn').innerText = btnTxt;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        if(!isLogin) toggleMode(); // If in signup, switch back to login
    }

    // --- 🔐 AUTH LOGIC ---
    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "SYSTEM LOGIN" : "CREATE ACCOUNT";
        document.getElementById('auth-main-btn').innerText = isLogin ? "Authorize Access" : "Register Operator";
        document.getElementById('toggle-txt').innerText = isLogin ? "New Operator? Create Account" : "Return to Login";
        document.getElementById('g-wrap').style.display = isLogin ? "block" : "none";
    }

    function handleAuth() {
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('pass').value.trim();
        const err = document.getElementById('auth-err');
        if(!e || !p) return err.innerText = "[!] Enter Credentials";

        if(isLogin) {
            auth.signInWithEmailAndPassword(e, p).then(res => {
                if(res.user.emailVerified) {
                    handleSuccess(res.user);
                } else {
                    showModal("NOT VERIFIED", "Please verify your email address. We sent a link to your inbox.", "⚠️", "OKAY");
                    auth.signOut();
                }
            }).catch(e => err.innerText = "[!] " + e.message);
        } else {
            auth.createUserWithEmailAndPassword(e, p).then(res => {
                res.user.sendEmailVerification().then(() => {
                    showModal("SUCCESS", "Account created successfully! A verification link has been sent to your email. Verify and then login.", "✅", "GO TO LOGIN");
                });
            }).catch(e => err.innerText = "[!] " + e.message);
        }
    }

    function loginGoogle() {
        auth.signInWithPopup(provider).then(res => handleSuccess(res.user))
            .catch(e => alert("Error: " + e.message));
    }

    function handleSuccess(user) {
        document.getElementById('op-name').innerText = user.displayName || user.email;
        switchPage('pg-dash');
        db.ref('logs/' + Date.now()).set({ user: user.email, action: "LOGIN", time: new Date().toLocaleString() });
    }

    // --- 🛠️ TRACE LOGIC ---
    let fetchCtrl = null;
    async function startTrace(type) {
        const val = document.getElementById('target').value.trim();
        if(!val) return;
        switchPage('pg-load');
        
        let p = 0;
        const b = document.getElementById('bar');
        const itv = setInterval(() => {
            p += 5; b.style.width = p + "%";
            if(p >= 98) clearInterval(itv);
        }, 150);

        fetchCtrl = new AbortController();
        try {
            const api = (type === 'mob') 
                ? `https://yash-code-with-ai.alphamovies.workers.dev/?num=${val}&key=7189814021`
                : `https://vehicle-eight-vert.vercel.app/api?rc=${val}`;
            
            const res = await fetch(api, { signal: fetchCtrl.signal });
            const data = await res.json();
            
            b.style.width = "100%";
            db.ref('logs/' + Date.now()).set({ user: auth.currentUser.email, action: type, target: val, time: new Date().toLocaleString() });

            setTimeout(() => {
                switchPage('pg-res');
                renderData(data);
            }, 600);
        } catch(e) { switchPage('pg-dash'); }
    }

    function renderData(data) {
        const out = document.getElementById('data-out');
        out.innerHTML = "";
        const skip = ["branding", "developer", "telegram", "yash", "flix", "http", "@"];
        function walk(obj) {
            for(let k in obj) {
                if(typeof obj[k] === 'object' && obj[k] !== null) walk(obj[k]);
                else {
                    let kL = k.toLowerCase();
                    if(!skip.some(s => kL.includes(s) || String(obj[k]).toLowerCase().includes(s))) {
                        out.innerHTML += `<div class="row"><span>${k.toUpperCase()}</span> <span>${obj[k]}</span></div>`;
                    }
                }
            }
        }
        walk(data);
    }

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
