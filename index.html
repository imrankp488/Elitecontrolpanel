// Google Sign In - Improved with better error handling
async function loginGoogle() {
    try {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' }); // Better UX

        const result = await auth.signInWithPopup(provider);
        console.log("Google Sign In Success:", result.user.email);
        
        // Auto create user entry if new
        const uid = result.user.uid;
        const userRef = db.ref('users/' + uid);
        const snap = await userRef.once('value');
        if (!snap.exists()) {
            await userRef.set({
                email: result.user.email,
                credits: 1,
                createdAt: new Date().toLocaleString()
            });
        }
        switchPage('pg-dash');
    } catch (error) {
        console.error("Google Sign In Error:", error.code, error.message);
        
        let msg = "Google Sign In failed. Please try again.";
        
        if (error.code === 'auth/popup-blocked') {
            msg = "Popup was blocked by your browser.\nPlease allow popups for this site and try again.";
        } else if (error.code === 'auth/popup-closed-by-user') {
            msg = "Sign in was cancelled. Please try again.";
        } else if (error.code === 'auth/unauthorized-domain') {
            msg = "Domain not authorized in Firebase Console.\nAdd your domain in Firebase Authentication Settings.";
        } else if (error.code === 'auth/network-request-failed') {
            msg = "Network error. Check your internet connection.";
        }
        
        showModal("GOOGLE SIGN IN ERROR", msg, true);
    }
}
