<!DOCTYPE html>
<html>
<head>
<title>ADMIN PANEL</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body { background:#000; color:#00ff41; font-family: monospace; }
table { width:100%; border-collapse:collapse; }
td,th { border:1px solid #00ff41; padding:8px; }
button { padding:5px; margin:2px; cursor:pointer; }
img { width:60px; border-radius:5px; }
</style>
</head>

<body>

<h2>Recharge Requests</h2>

<table>
<tr>
<th>User</th>
<th>Image</th>
<th>Amount</th>
<th>Action</th>
</tr>

<tbody id="data"></tbody>
</table>

<script>
const firebaseConfig = {
 apiKey:"AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
 databaseURL:"https://adminpanel-6b862-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

db.ref("recharge_requests").on("value",snap=>{
 const d=snap.val();
 let html="";

 if(!d){
  document.getElementById("data").innerHTML="<tr><td colspan='4'>No requests</td></tr>";
  return;
 }

 Object.keys(d).reverse().forEach(id=>{
  let r=d[id];

  html+=`
  <tr>
   <td>${r.user}</td>
   <td><img src="${r.screenshot}" onclick="window.open('${r.screenshot}')"></td>
   <td>${r.amount}</td>
   <td>
    <button onclick="approve('${id}','${r.uid}','${r.amount}')">Approve</button>
    <button onclick="reject('${id}')">Reject</button>
   </td>
  </tr>`;
 });

 document.getElementById("data").innerHTML=html;
});

async function approve(id,uid,amt){
 const map={50:10,100:30};
 const add=map[amt]||10;

 const ref=db.ref("users/"+uid+"/credits");
 const snap=await ref.get();
 let c=snap.val()||0;

 await ref.set(c+add);
 await db.ref("recharge_requests/"+id).update({status:"approved"});

 alert("Approved & credits added");
}

function reject(id){
 db.ref("recharge_requests/"+id).update({status:"rejected"});
 alert("Rejected");
}
</script>

</body>
</html>
