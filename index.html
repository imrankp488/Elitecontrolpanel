<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMRAN PLAYZ | ELITE SYSTEM v14.4</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root { --p:#00ff41; --r:#ff3131; --b:#000; --panel:#0a0a0a; --blue:#00ccff; --y:#ffd700;}
body{background:var(--b);color:var(--p);font-family:'Share Tech Mono';margin:0;}
.page{display:none;min-height:100vh;justify-content:center;align-items:center;flex-direction:column;}
.active{display:flex;}
.container{width:90%;max-width:420px;background:var(--panel);padding:20px;border-radius:12px;border:1px solid var(--p);}
h1{color:#fff;text-align:center;}
input{width:100%;padding:12px;margin-bottom:10px;background:#050505;border:1px solid #333;color:var(--p);}
button{width:100%;padding:12px;margin-top:5px;background:transparent;border:1px solid var(--p);color:var(--p);}
.upload-box{border:1px dashed #444;padding:15px;text-align:center;margin-bottom:10px;position:relative;}
input[type=file]{position:absolute;width:100%;height:100%;opacity:0;top:0;left:0;}
.bar-bg{width:100%;height:8px;background:#111;margin-top:10px;}
.bar-f{width:0%;height:100%;background:var(--p);}
.res-row{display:flex;justify-content:space-between;border-bottom:1px solid #222;padding:6px 0;}
.modal-overlay{display:none;position:fixed;width:100%;height:100%;background:#000d;top:0;left:0;justify-content:center;align-items:center;}
.modal-box{background:#050505;padding:20px;border:1px solid var(--p);}
</style>
</head>

<body>

<div id="modal" class="modal-overlay">
<div class="modal-box">
<h2 id="m-t"></h2>
<p id="m-m"></p>
<button onclick="closeModal()">OK</button>
</div>
</div>

<!-- AUTH -->
<div id="pg-auth" class="page active">
<div class="container">
<h1>LOGIN</h1>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="handleAuth()">LOGIN</button>
<button onclick="loginGoogle()">GOOGLE</button>
<p onclick="toggleMode()">Switch Mode</p>
</div>
</div>

<!-- DASH -->
<div id="pg-dash" class="page">
<div class="container">
<h1>DASHBOARD</h1>
<div>CREDITS: <span id="user-credits">0</span></div>
<input id="target" placeholder="Enter">
<button onclick="runTrace('mob')">Mobile</button>
<button onclick="runTrace('veh')">Vehicle</button>
<button onclick="switchPage('pg-plans')">Recharge</button>
</div>
</div>

<!-- PLANS -->
<div id="pg-plans" class="page">
<div class="container">
<h1>Recharge</h1>

<div onclick="openPay(50)">₹50 - 10</div>
<div onclick="openPay(100)">₹100 - 30</div>

<div class="upload-box">
<span id="fn">Select Image</span>
<input type="file" id="p-img" onchange="document.getElementById('fn').innerText=this.files[0]?this.files[0].name:'Select Image'">
</div>

<button id="up-btn" onclick="uploadImgBB()">Submit</button>
<button onclick="switchPage('pg-dash')">Back</button>
</div>
</div>

<!-- LOADING -->
<div id="pg-load" class="page">
<div class="container">
<h1>Processing...</h1>
<div class="bar-bg"><div id="bar" class="bar-f"></div></div>
</div>
</div>

<!-- RESULT -->
<div id="pg-res" class="page">
<div class="container">
<h1>RESULT</h1>
<div id="data-out"></div>
<button onclick="switchPage('pg-dash')">Back</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
authDomain:"adminpanel-6b862.firebaseapp.com",
databaseURL:"https://adminpanel-6b862-default-rtdb.firebaseio.com",
projectId:"adminpanel-6b862"
};

const IMGBB_KEY="47d4ddf5133629b43bb606ec944137f9";

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.database();

let credits=0,isLogin=true;

auth.onAuthStateChanged(u=>{if(u)sync(u);else switchPage('pg-auth');});

function showModal(t,m){m_t.innerText=t;m_m.innerText=m;modal.style.display='flex';}
function closeModal(){modal.style.display='none';}
function switchPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}

function toggleMode(){isLogin=!isLogin;}

function handleAuth(){
const e=email.value,p=pass.value;
if(isLogin) auth.signInWithEmailAndPassword(e,p).catch(e=>showModal("Error",e.message));
else auth.createUserWithEmailAndPassword(e,p).then(async r=>{
await db.ref('users/'+r.user.uid).set({credits:1});
showModal("Done","Account Created");
});
}

function loginGoogle(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}

function sync(u){
db.ref('users/'+u.uid).on('value',s=>{
credits=s.val()?.credits||0;
document.getElementById('user-credits').innerText=credits;
switchPage('pg-dash');
});
}

function openPay(a){location.href=`upi://pay?pa=imrankhan17@ptyes&pn=IMRAN&am=${a}&cu=INR`;}

async function uploadImgBB(){
const file=document.getElementById('p-img').files[0];
if(!file) return showModal("Error","Select image");

const btn=document.getElementById('up-btn');
btn.innerText="Uploading...";

const reader=new FileReader();

reader.onloadend=async ()=>{
try{
const base64=reader.result.split(',')[1];
const fd=new FormData();
fd.append("image",base64);

const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{method:"POST",body:fd});
const d=await res.json();

await db.ref('recharge_requests/'+Date.now()).set({img:d.data.url,user:auth.currentUser.email});

showModal("Success","Uploaded");
switchPage('pg-dash');

}catch{showModal("Error","Upload Failed");}

btn.innerText="Submit";
};

reader.readAsDataURL(file);
}

function render(data){
const out=document.getElementById('data-out');
out.innerHTML="";
const skip=["branding","developer","processed_by","owner_contact"];

function walk(o){
for(let k in o){
if(typeof o[k]==="object") walk(o[k]);
else if(!skip.includes(k.toLowerCase())){
out.innerHTML+=`<div class="res-row"><span>${k}</span><span>${o[k]}</span></div>`;
}
}
}
walk(data);
}

async function runTrace(t){
if(credits<=0) return showModal("No Credits","Recharge");

switchPage('pg-load');

let p=0;
const bar=document.getElementById('bar');
const it=setInterval(()=>{p+=5;if(p<95)bar.style.width=p+"%";},100);

try{
const v=target.value;
const url=(t==='mob')?`https://yash-code-with-ai.alphamovies.workers.dev/?num=${v}&key=7189814021`:`https://vehicle-eight-vert.vercel.app/api?rc=${v}`;

const res=await fetch(url);
const data=await res.json();

clearInterval(it);
bar.style.width="100%";

if(!data || Object.keys(data).length<2){
showModal("No Data","Try another");
switchPage('pg-dash');
return;
}

await db.ref('users/'+auth.currentUser.uid).update({credits:credits-1});

setTimeout(()=>{
switchPage('pg-res');
render(data);
},400);

}catch{
showModal("Error","Server issue");
switchPage('pg-dash');
}
}
</script>
</body>
</html>
