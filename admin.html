<!DOCTYPE html>
<html>
<head>
    <title>IMRAN ADMIN | LIVE LOGS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: #050505; }
        th, td { border: 1px solid #004400; padding: 12px; text-align: left; font-size: 13px; }
        th { background: #002200; color: #fff; }
        tr:hover { background: #001100; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #00ff41; color: #000; }
    </style>
</head>
<body>
    <div class="header">
        <h1>[/>] SYSTEM ACTIVITY LOGS</h1>
        <p>Real-time monitor for Elite Terminal</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>TIME</th>
                <th>OPERATOR</th>
                <th>ACTION</th>
                <th>TARGET</th>
            </tr>
        </thead>
        <tbody id="log-body">
            <tr><td colspan="4" style="text-align:center;">Listening for data...</td></tr>
        </tbody>
    </table>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
      authDomain: "adminpanel-6b862.firebaseapp.com",
      projectId: "adminpanel-6b862",
      storageBucket: "adminpanel-6b862.firebasestorage.app",
      messagingSenderId: "220057098294",
      appId: "1:220057098294:web:9453e948e8817544916097",
      measurementId: "G-BMFF36NP9Z",
      databaseURL: "https://adminpanel-6b862-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('logs').on('value', (snap) => {
        const data = snap.val();
        const tbody = document.getElementById('log-body');
        tbody.innerHTML = "";
        
        if(!data) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No logs yet.</td></tr>";
            return;
        }

        // Reverse to show latest first
        Object.keys(data).reverse().forEach(key => {
            const l = data[key];
            tbody.innerHTML += `
                <tr>
                    <td>${l.time}</td>
                    <td><span class="badge">${l.user || "UNKNOWN"}</span></td>
                    <td>${l.action}</td>
                    <td>${l.target || "-"}</td>
                </tr>
            `;
        });
    });
</script>
</body>
</html>
