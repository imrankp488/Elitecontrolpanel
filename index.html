<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMRAN PLAYZ | SYSTEM</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body { background:#000; color:#00ff41; font-family: monospace; text-align:center; }
.container { max-width:400px; margin:auto; padding:20px; border:1px solid #00ff41; }
input,button { width:100%; padding:10px; margin:5px 0; }
button { background:none; border:1px solid #00ff41; color:#00ff41; cursor:pointer; }
</style>
</head>

<body>

<div id="loader">Loading...</div>

<div id="auth" style="display:none;">
<div class="container">
<h2>LOGIN / REGISTER</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="handleAuth()">Continue</button>
</div>
</div>

<div id="dash" style="display:none;">
<div class="container">
<h2>Dashboard</h2>
Credits: <span id="credits">0</span>

<input id="target" placeholder="Target">
<button onclick="trace()">Run</button>

<hr>

<button onclick="selectPlan(50)">₹50</button>
<button onclick="selectPlan(100)">₹100</button>

<button onclick="pay()">Pay</button>

<input type="file" id="img">
<button onclick="upload()">Submit Proof</button>

<button onclick="logout()">Logout</button>
</div>
</div>

<script>
const firebaseConfig = {
 apiKey:"AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
 authDomain:"adminpanel-6b862.firebaseapp.com",
 databaseURL:"https://adminpanel-6b862-default-rtdb.firebaseio.com",
 projectId:"adminpanel-6b862"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let selectedAmt = 0;

auth.onAuthStateChanged(user=>{
 document.getElementById("loader").style.display="none";

 if(user){
   if(!user.emailVerified){
     alert("Please verify your email first.");
     auth.signOut();
     return;
   }

   db.ref("users/"+user.uid).on("value",snap=>{
     document.getElementById("credits").innerText = snap.val()?.credits || 0;
   });

   document.getElementById("auth").style.display="none";
   document.getElementById("dash").style.display="block";

 }else{
   document.getElementById("auth").style.display="block";
 }
});

function handleAuth(){
 const e=email.value;
 const p=pass.value;

 auth.createUserWithEmailAndPassword(e,p)
 .then(async res=>{
   await res.user.sendEmailVerification();
   alert("Verification email sent. Please verify.");
   auth.signOut();
 })
 .catch(()=>{
   auth.signInWithEmailAndPassword(e,p)
   .then(res=>{
     if(!res.user.emailVerified){
       alert("Email not verified");
       auth.signOut();
     }
   })
   .catch(err=>alert(err.message));
 });
}

function selectPlan(a){
 selectedAmt=a;
 alert("Selected ₹"+a);
}

function pay(){
 const upi=`upi://pay?pa=imrankhan17@ptyes&pn=IMRAN&am=${selectedAmt}&cu=INR`;

 if(/iPhone|iPad/.test(navigator.userAgent)){
   alert("Use QR method on iPhone");
 }else{
   window.location.href=upi;
 }
}

function upload(){
 const file=document.getElementById("img").files[0];
 if(!file) return alert("Select file");

 const reader=new FileReader();
 reader.readAsDataURL(file);

 reader.onload=async()=>{
   await db.ref("recharge_requests/"+Date.now()).set({
     user: auth.currentUser.email,
     uid: auth.currentUser.uid,
     screenshot: reader.result,
     amount: selectedAmt,
     status:"pending",
     time:new Date().toLocaleString()
   });

   alert("Screenshot submitted");
 };
}

async function trace(){
 const ref=db.ref("users/"+auth.currentUser.uid+"/credits");
 const snap=await ref.get();
 let c=snap.val()||0;

 if(c<=0) return alert("No credits");

 await ref.set(c-1);
 alert("Trace done (demo)");
}

function logout(){
 auth.signOut();
}
</script>

</body>
</html>
