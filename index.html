<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Analytics | Imran Playz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; /* Modern Indigo */
            --bg: #f9fafb;
            --card: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg); color: var(--text-main); line-height: 1.5; }

        /* --- LOGIN PAGE --- */
        .auth-container {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .auth-card {
            background: var(--card); width: 100%; max-width: 400px;
            padding: 40px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border);
        }
        .auth-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; text-align: center; }
        .auth-card p { color: var(--text-sub); text-align: center; font-size: 14px; margin-bottom: 30px; }

        /* --- DASHBOARD LAYOUT --- */
        #dashboard { display: none; }
        .top-nav {
            background: var(--card); padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 700; color: var(--primary); font-size: 18px; letter-spacing: -0.5px; }

        .main-content { padding: 20px; max-width: 800px; margin: 0 auto; }

        /* --- STATS CARDS --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card {
            background: var(--card); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border); text-align: center;
        }
        .stat-card span { display: block; font-size: 12px; color: var(--text-sub); text-transform: uppercase; font-weight: 600; }
        .stat-card h3 { font-size: 20px; margin-top: 5px; color: var(--primary); }

        /* --- SEARCH BOX --- */
        .search-section {
            background: var(--card); padding: 25px; border-radius: 16px;
            border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .search-section h4 { margin-bottom: 15px; font-size: 16px; }

        input {
            width: 100%; padding: 14px; border-radius: 10px;
            border: 1px solid var(--border); background: #f3f4f6;
            margin-bottom: 15px; font-size: 16px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 15px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #4338ca; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); margin-top: 10px; }

        /* --- RESULT AREA --- */
        #result-display {
            margin-top: 25px; display: none;
            background: #fff; border-radius: 16px; border: 1px solid var(--border); overflow: hidden;
        }
        .res-header { background: #f9fafb; padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: 600; }
        .res-body { padding: 20px; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #f3f4f6; }
        .data-row span:first-child { color: var(--text-sub); font-size: 14px; }
        .data-row span:last-child { font-weight: 600; font-size: 14px; text-align: right; }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div id="login-page" class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Enter your credentials to access the panel</p>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-primary" onclick="login()">Sign In</button>
        <div id="login-err" style="color: #ef4444; font-size: 13px; margin-top: 15px; text-align: center; display: none;">Invalid username or password</div>
    </div>
</div>

<div id="dashboard">
    <nav class="top-nav">
        <div class="logo">ELITE ANALYTICS</div>
        <button class="btn" style="width: auto; padding: 8px 15px; font-size: 12px;" onclick="location.reload()">Logout</button>
    </nav>

    <div class="main-content">
        <div class="stats-grid">
            <div class="stat-card">
                <span>Total Queries</span>
                <h3 id="q-count">0</h3>
            </div>
            <div class="stat-card">
                <span>System Status</span>
                <h3 style="color: #10b981; font-size: 16px;">SECURE</h3>
            </div>
        </div>

        <div class="search-section">
            <h4>Data Lookup Module</h4>
            <input type="text" id="query-input" placeholder="Enter Mobile or Vehicle Number">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="fetchData('mobile')">Search Mobile</button>
                <button class="btn btn-primary" style="background: #1f2937;" onclick="fetchData('vehicle')">Search Vehicle</button>
            </div>
            <button class="btn btn-outline" onclick="document.getElementById('query-input').value=''">Clear Form</button>
        </div>

        <div id="result-display">
            <div class="res-header" id="res-title">Results</div>
            <div class="res-body" id="res-content">
                </div>
        </div>
    </div>
</div>

<script>
    // --- AUTH LOGIC ---
    function login() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();

        if (u === "user123" && p === "password18") {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else {
            document.getElementById('login-err').style.display = 'block';
        }
    }

    // --- DATA FETCHING ---
    async function fetchData(type) {
        const target = document.getElementById('query-input').value.trim();
        if (!target) return alert("Please enter a value");

        // UI Reset
        const resBox = document.getElementById('result-display');
        const resContent = document.getElementById('res-content');
        resBox.style.display = 'block';
        resContent.innerHTML = "<p style='text-align:center; color:gray;'>Processing request...</p>";

        try {
            const api = (type === 'mobile') 
                ? `https://yash-code-with-ai.alphamovies.workers.dev/?num=${target}&key=7189814021`
                : `https://vehicle-eight-vert.vercel.app/api?rc=${target}`;
            
            const response = await fetch(api);
            const data = await response.json();
            
            renderData(data, type.toUpperCase());
            updateCount();
            
            // Log to console (For now)
            console.log(`Activity: ${type} search for ${target}`);

        } catch (error) {
            resContent.innerHTML = "<p style='color:red;'>Service temporarily unavailable.</p>";
        }
    }

    function renderData(data, title) {
        const resContent = document.getElementById('res-content');
        document.getElementById('res-title').innerText = title + " INFORMATION";
        resContent.innerHTML = "";

        if (!data || data.status === false) {
            resContent.innerHTML = "<p style='text-align:center;'>No records found.</p>";
            return;
        }

        function buildList(obj) {
            for (let key in obj) {
                if (typeof obj[key] === 'object' && obj[key] !== null) {
                    buildList(obj[key]);
                } else {
                    const row = document.createElement('div');
                    row.className = 'data-row';
                    row.innerHTML = `<span>${key.toUpperCase()}</span> <span>${obj[key]}</span>`;
                    resContent.appendChild(row);
                }
            }
        }
        buildList(data);
    }

    function updateCount() {
        let count = parseInt(document.getElementById('q-count').innerText);
        document.getElementById('q-count').innerText = count + 1;
    }
</script>

</body>
</html>
