<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMRAN PLAYZ | ELITE SYSTEM v7.5</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --r: #ff3131; --b: #000; --panel: rgba(10, 10, 10, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: 0.3s ease; }
        body { background: var(--b); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; overflow-x: hidden; }
        .page { display: none; min-height: 100vh; width: 100%; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex !important; }
        .container { width: 100%; max-width: 450px; background: var(--panel); border: 1px solid var(--p); border-radius: 15px; padding: 30px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 2px; margin-bottom: 25px; color: #fff; text-shadow: 0 0 10px var(--p); }
        input { width: 100%; padding: 14px; background: #050505; border: 1px solid #333; color: var(--p); border-radius: 8px; margin-bottom: 15px; outline: none; font-size: 16px; font-family: inherit; }
        button { width: 100%; padding: 14px; background: transparent; border: 1.5px solid var(--p); color: var(--p); font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 8px; font-family: inherit; margin-bottom: 10px; }
        button:hover { background: var(--p); color: #000; }
        .btn-google { background: #fff; color: #000; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-red { border-color: var(--r); color: var(--r); }
        .toggle-link { color: #888; font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
        .loader-wrap { width: 100%; max-width: 300px; margin: 20px 0; }
        .bar-bg { width: 100%; height: 12px; background: #111; border: 1px solid var(--p); border-radius: 6px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--p); transition: 0.2s; }
        .data-vault { width: 100%; text-align: left; background: #050505; border: 1px dashed var(--p); border-radius: 10px; padding: 15px; max-height: 400px; overflow-y: auto; }
        .row { border-bottom: 1px solid rgba(0,255,0,0.1); padding: 10px 0; display: flex; justify-content: space-between; font-size: 14px; }
    </style>
</head>
<body>

    <div id="pg-auth" class="page active">
        <div class="container">
            <h1 id="auth-title">SYSTEM LOGIN</h1>
            <p id="auth-sub" style="font-size: 11px; color: #666; margin-bottom: 20px;">AUTHORIZE ACCESS</p>
            
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            
            <button id="main-auth-btn" onclick="handleAuth()">Login Access</button>
            <div id="google-wrap">
                <div style="margin: 10px 0; color: #444; font-size: 12px;">OR</div>
                <button class="btn-google" onclick="loginGoogle()">
                    <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" width="20"> Sign in with Google
                </button>
            </div>

            <span class="toggle-link" id="toggle-txt" onclick="toggleAuthMode()">New User? Create Account</span>
            <p id="auth-err" style="color:var(--r); font-size:10px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="pg-dash" class="page">
        <div class="container">
            <h1>COMMAND CENTER</h1>
            <p style="font-size: 11px; margin-bottom: 20px;">OP: <span id="op-name" style="color:#fff;"></span></p>
            <input type="text" id="target" placeholder="987654XXXX / DL10CXXXX">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="startProcess('mob')">Number Info</button>
                <button onclick="startProcess('veh')">Vehicle Info</button>
            </div>
            <button class="btn-red" style="margin-top:20px; width:100%;" onclick="location.reload()">Terminate</button>
        </div>
    </div>

    <div id="pg-load" class="page">
        <div class="container" style="border:none; background:transparent;">
            <h1 id="l-status">INITIALIZING...</h1>
            <div class="loader-wrap">
                <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
            </div>
            <button class="btn-red" style="width:auto; padding: 10px 30px;" onclick="abortAll()">ABORT</button>
        </div>
    </div>

    <div id="pg-res" class="page">
        <div class="container" style="max-width: 600px;">
            <h1>DECRYPTED DATA</h1>
            <div id="data-output" class="data-vault"></div>
            <button style="margin-top: 20px;" onclick="switchPage('pg-dash')">New Query</button>
        </div>
    </div>

<script>
    // --- 🔑 FIREBASE SETUP ---
    const firebaseConfig = {
      apiKey: "AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
      authDomain: "adminpanel-6b862.firebaseapp.com",
      databaseURL: "https://adminpanel-6b862-default-rtdb.firebaseio.com",
      projectId: "adminpanel-6b862",
      storageBucket: "adminpanel-6b862.firebasestorage.app",
      messagingSenderId: "220057098294",
      appId: "1:220057098294:web:9453e948e8817544916097"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const provider = new firebase.auth.GoogleAuthProvider();

    let isLoginMode = true;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "SYSTEM LOGIN" : "CREATE ACCOUNT";
        document.getElementById('main-auth-btn').innerText = isLoginMode ? "Login Access" : "Register Now";
        document.getElementById('toggle-txt').innerText = isLoginMode ? "New User? Create Account" : "Back to Login";
        document.getElementById('google-wrap').style.display = isLoginMode ? "block" : "none";
    }

    function handleAuth() {
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('pass').value.trim();
        const err = document.getElementById('auth-err');

        if(isLoginMode) {
            auth.signInWithEmailAndPassword(e, p)
                .then(res => handleLoginSuccess(res.user))
                .catch(e => err.innerText = "[!] " + e.message);
        } else {
            auth.createUserWithEmailAndPassword(e, p)
                .then(res => {
                    alert("Account Created! You can login now.");
                    toggleAuthMode();
                })
                .catch(e => err.innerText = "[!] " + e.message);
        }
    }

    function loginGoogle() {
        auth.signInWithPopup(provider)
            .then(res => handleLoginSuccess(res.user))
            .catch(e => alert("Google Failed: " + e.message));
    }

    function handleLoginSuccess(user) {
        document.getElementById('op-name').innerText = user.displayName || user.email;
        switchPage('pg-dash');
        db.ref('logs/' + Date.now()).set({ user: user.email, action: "LOGIN", time: new Date().toLocaleString() });
    }

    // --- 🛠️ FETCH LOGIC ---
    let currentCtrl = null;
    let barInt = null;

    async function startProcess(type) {
        const val = document.getElementById('target').value.trim();
        if(!val) return;
        switchPage('pg-load');
        
        let p = 0;
        barInt = setInterval(() => {
            p += 5; if(p >= 98) p = 98;
            document.getElementById('bar').style.width = p + "%";
        }, 150);

        currentCtrl = new AbortController();
        try {
            const api = (type === 'mob') 
                ? `https://yash-code-with-ai.alphamovies.workers.dev/?num=${val}&key=7189814021`
                : `https://vehicle-eight-vert.vercel.app/api?rc=${val}`;
            
            const res = await fetch(api, { signal: currentCtrl.signal });
            const data = await res.json();
            
            clearInterval(barInt);
            document.getElementById('bar').style.width = "100%";
            db.ref('logs/' + Date.now()).set({ user: auth.currentUser.email, action: type, target: val, time: new Date().toLocaleString() });

            setTimeout(() => {
                switchPage('pg-res');
                renderData(data);
            }, 500);
        } catch(e) { abortAll(); }
    }

    function renderData(data) {
        const out = document.getElementById('data-output');
        out.innerHTML = "";
        const skip = ["branding", "developer", "telegram", "yash", "flix", "http", "@"];
        function walk(obj) {
            for(let k in obj) {
                if(typeof obj[k] === 'object' && obj[k] !== null) walk(obj[k]);
                else {
                    let kL = k.toLowerCase(), vL = String(obj[k]).toLowerCase();
                    if(!skip.some(s => kL.includes(s) || vL.includes(s))) {
                        out.innerHTML += `<div class="row"><span style="color:#888; font-size:11px;">${k.toUpperCase()}</span> <span>${obj[k]}</span></div>`;
                    }
                }
            }
        }
        walk(data);
    }

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function abortAll() {
        if(currentCtrl) currentCtrl.abort();
        clearInterval(barInt);
        switchPage('pg-dash');
    }
</script>
</body>
</html>
