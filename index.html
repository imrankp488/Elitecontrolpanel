<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMRAN PLAYZ | ELITE SYSTEM</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
:root { --p:#00ff41; --b:#000; --panel:#0a0a0a; }
body { background:var(--b); color:var(--p); font-family:monospace; margin:0; }

.page { display:none; height:100vh; justify-content:center; align-items:center; }
.active { display:flex; }

.container {
 width:90%; max-width:400px;
 background:var(--panel);
 border:1px solid var(--p);
 padding:20px;
 text-align:center;
}

input {
 width:100%; padding:12px;
 margin:8px 0;
 background:#050505;
 border:1px solid #333;
 color:var(--p);
}

button {
 width:100%; padding:12px;
 margin:5px 0;
 background:none;
 border:1px solid var(--p);
 color:var(--p);
 cursor:pointer;
}

button:hover { background:var(--p); color:#000; }

.link { font-size:12px; color:#888; cursor:pointer; }
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader" class="page active">
<div class="container"><h2>LOADING...</h2></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<div class="container">
<h2>LOGIN</h2>

<input id="l-email" placeholder="Email">
<input id="l-pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<button onclick="googleLogin()">GOOGLE LOGIN</button>

<p class="link" onclick="show('register')">Create Account</p>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="page">
<div class="container">
<h2>REGISTER</h2>

<input id="r-email" placeholder="Email">
<input id="r-pass" type="password" placeholder="Password">

<button onclick="register()">CREATE ACCOUNT</button>

<p class="link" onclick="show('login')">Already have account?</p>
</div>
</div>

<!-- DASH -->
<div id="dash" class="page">
<div class="container">
<h2>DASHBOARD</h2>

Credits: <span id="credits">0</span>

<input id="target" placeholder="Target">

<button onclick="trace()">RUN</button>

<hr>

<button onclick="selectPlan(50)">₹50</button>
<button onclick="selectPlan(100)">₹100</button>

<button onclick="pay()">PAY</button>

<input type="file" id="img">
<button onclick="upload()">SUBMIT PROOF</button>

<button onclick="logout()">LOGOUT</button>
</div>
</div>

<script>
const firebaseConfig = {
 apiKey:"AIzaSyB011WYaNhJQx77yO3Ow7l-Z_clhS89Z8A",
 authDomain:"adminpanel-6b862.firebaseapp.com",
 databaseURL:"https://adminpanel-6b862-default-rtdb.firebaseio.com",
 projectId:"adminpanel-6b862"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let selectedAmt = 0;

// PAGE SWITCH
function show(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// AUTH STATE
auth.onAuthStateChanged(user=>{
 document.getElementById("loader").classList.remove("active");

 if(user){
   if(!user.emailVerified){
     alert("Please verify your email before login.");
     auth.signOut();
     show("login");
     return;
   }

   db.ref("users/"+user.uid).on("value",snap=>{
     document.getElementById("credits").innerText = snap.val()?.credits || 0;
   });

   show("dash");

 } else {
   show("login");
 }
});

// LOGIN
function login(){
 const e=document.getElementById("l-email").value;
 const p=document.getElementById("l-pass").value;

 auth.signInWithEmailAndPassword(e,p)
 .then(res=>{
   if(!res.user.emailVerified){
     alert("Email not verified!");
     auth.signOut();
   }
 })
 .catch(err=>alert(err.message));
}

// REGISTER
function register(){
 const e=document.getElementById("r-email").value;
 const p=document.getElementById("r-pass").value;

 auth.createUserWithEmailAndPassword(e,p)
 .then(async res=>{
   await res.user.sendEmailVerification();

   await db.ref("users/"+res.user.uid).set({
     email:e,
     credits:1
   });

   alert("Verification email sent. Please verify.");
   auth.signOut();
   show("login");
 })
 .catch(err=>alert(err.message));
}

// GOOGLE LOGIN
function googleLogin(){
 const provider = new firebase.auth.GoogleAuthProvider();

 auth.signInWithPopup(provider)
 .then(res=>{
   const uid=res.user.uid;

   db.ref("users/"+uid).once("value").then(snap=>{
     if(!snap.exists()){
       db.ref("users/"+uid).set({
         email:res.user.email,
         credits:1
       });
     }
   });
 })
 .catch(err=>alert(err.message));
}

// PLAN
function selectPlan(a){
 selectedAmt=a;
 alert("Selected ₹"+a);
}

// UPI
function pay(){
 const upi=`upi://pay?pa=imrankhan17@ptyes&pn=IMRAN&am=${selectedAmt}&cu=INR`;

 if(/iPhone|iPad/.test(navigator.userAgent)){
   alert("Use QR on iPhone");
 }else{
   window.location.href=upi;
 }
}

// UPLOAD
function upload(){
 const file=document.getElementById("img").files[0];
 if(!file) return alert("Select screenshot");

 const reader=new FileReader();
 reader.readAsDataURL(file);

 reader.onload=async()=>{
   await db.ref("recharge_requests/"+Date.now()).set({
     user: auth.currentUser.email,
     uid: auth.currentUser.uid,
     screenshot: reader.result,
     amount: selectedAmt,
     status:"pending",
     time:new Date().toLocaleString()
   });

   alert("Submitted");
 };
}

// TRACE
async function trace(){
 const ref=db.ref("users/"+auth.currentUser.uid+"/credits");
 const snap=await ref.get();
 let c=snap.val()||0;

 if(c<=0) return alert("No credits");

 await ref.set(c-1);
 alert("Done");
}

// LOGOUT
function logout(){
 auth.signOut();
}
</script>

</body>
</html>
