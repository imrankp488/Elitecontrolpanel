<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMRAN PLAYZ | ELITE SYSTEM v15.1</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root { --p:#00ff41; --b:#000; --panel:#0a0a0a; }
body { background:var(--b); color:var(--p); font-family:'Share Tech Mono'; margin:0; }

.page{display:none; min-height:100vh; align-items:center; justify-content:center;}
.active{display:flex;}

.container{width:90%; max-width:420px; background:var(--panel); padding:25px; border-radius:12px; text-align:center;}

input,button{width:100%; padding:12px; margin:6px 0;}
button{border:1px solid var(--p); background:transparent; color:var(--p);}

.bar-bg{height:8px; background:#111; margin:10px 0;}
.bar-f{height:100%; width:0%; background:var(--p); transition:0.2s;}

.data-box{background:#050505; padding:10px; border:1px dashed var(--p); text-align:left;}
.row{padding:6px 0; border-bottom:1px solid #111; display:flex; justify-content:space-between;}
</style>
</head>

<body>

<div id="pg-auth" class="page active">
<div class="container">
<h2>LOGIN</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="handleAuth()">Login</button>
<button onclick="loginGoogle()">Google Login</button>
</div>
</div>

<div id="pg-dash" class="page">
<div class="container">
<h2>DASHBOARD</h2>
Credits: <span id="user-credits">0</span>
<input id="target" placeholder="Enter Target">
<button onclick="runTrace('mob')">Search</button>
</div>
</div>

<div id="pg-load" class="page">
<div class="container">
<h2>Processing...</h2>
<div class="bar-bg"><div id="bar" class="bar-f"></div></div>
</div>
</div>

<div id="pg-res" class="page">
<div class="container">
<h2>RESULT</h2>
<div id="data-out" class="data-box"></div>
<button onclick="switchPage('pg-dash')">Back</button>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyB011WYa...",
authDomain:"adminpanel-6b862.firebaseapp.com",
databaseURL:"https://adminpanel-6b862-default-rtdb.firebaseio.com",
projectId:"adminpanel-6b862"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let credits=0;

// ✅ AUTO LOGIN FIX
auth.onAuthStateChanged(user=>{
if(user){
db.ref('users/'+user.uid).once('value').then(snap=>{
let d=snap.val();
if(!d){
db.ref('users/'+user.uid).set({credits:1});
d={credits:1};
}
credits=d.credits;
document.getElementById('user-credits').innerText=credits;
switchPage('pg-dash');
});
}else{
switchPage('pg-auth');
}
});

function switchPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function handleAuth(){
auth.signInWithEmailAndPassword(email.value,pass.value)
.catch(e=>alert(e.message));
}

function loginGoogle(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

// ✅ PROGRESS BAR FIX
function startBar(){
let p=0;
const bar=document.getElementById('bar');
bar.style.width="0%";

const i=setInterval(()=>{
p+=5;
bar.style.width=p+"%";
if(p>=100) clearInterval(i);
},120);
}

// ✅ TRACE
async function runTrace(type){
if(credits<=0) return alert("No credits");

const val=target.value.trim();
if(!val) return;

switchPage('pg-load');
startBar();

try{
const api=`https://yash-code-with-ai.alphamovies.workers.dev/?num=${val}&key=7189814021`;

const res=await fetch(api);
const data=await res.json();

// ❌ REMOVE BRANDING
const skip=["branding","developer","processed_by","owner_contact"];

if(!data || Object.keys(data).length===0){
alert("No data found. Credit not deducted.");
switchPage('pg-dash');
return;
}

// deduct
await db.ref('users/'+auth.currentUser.uid).update({credits:credits-1});

setTimeout(()=>{
switchPage('pg-res');
render(data,skip);
},600);

}catch(e){
alert("Server error");
switchPage('pg-dash');
}
}

// ✅ CLEAN UI OUTPUT
function render(data,skip){
const out=document.getElementById('data-out');
out.innerHTML="";

for(let k in data){
if(typeof data[k]!=="object" && !skip.includes(k)){
out.innerHTML+=`
<div class="row">
<span>${k.toUpperCase()}</span>
<span>${data[k]}</span>
</div>`;
}
}
}
</script>

</body>
</html>
