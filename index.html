        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }

// Only changed part: runTrace function (better vehicle handling)

async function runTrace(t) {
    if (credits <= 0) return showModal("INSUFFICIENT CREDITS", "You don't have enough credits. Please recharge to continue.", true);

    let v = document.getElementById('target').value.trim().toUpperCase();
    if (!v) return showModal("INPUT REQUIRED", "Please enter a valid number or vehicle registration.", true);

    if (t === 'veh' && v.length < 5) {
        return showModal("INVALID RC", "Please enter a valid Vehicle Registration Number (e.g. MH12AB1234)", true);
    }

    switchPage('pg-load');
    document.querySelectorAll('.log-line').forEach(l => l.classList.remove('show'));
    const bar = document.getElementById('bar');
    bar.style.width = "0%";

    let p = 0;
    const itv = setInterval(() => {
        p += Math.random() * 20 + 8;
        if (p > 96) p = 96;
        bar.style.width = p + "%";
        if (p > 15) document.getElementById('log-1').classList.add('show');
        if (p > 45) document.getElementById('log-2').classList.add('show');
        if (p > 70) document.getElementById('log-3').classList.add('show');
        if (p > 88) document.getElementById('log-4').classList.add('show');
    }, 150);

    try {
        const api = (t === 'mob') 
            ? `https://yash-code-with-ai.alphamovies.workers.dev/?num=${encodeURIComponent(v)}&key=7189814021`
            : `https://vehicle-eight-vert.vercel.app/api?rc=${encodeURIComponent(v)}`;

        const res = await fetch(api);
        const data = await res.json();

        clearInterval(itv);
        bar.style.width = "100%";

        const uid = auth.currentUser.uid;
        const type = t === 'mob' ? 'Mobile' : 'Vehicle';
        const isSuccess = !(!data || (t === 'veh' && !data.details) || (t === 'mob' && Object.keys(data).length < 3));

        // Save to history
        await db.ref('users/' + uid + '/history').push({
            timestamp: Date.now(),
            type: type,
            query: v,
            success: isSuccess,
            status: isSuccess ? 'success' : 'no_data'
        });

        if (!isSuccess) {
            showModal("DATA NOT FOUND", "Sorry, no data found for this " + (t==='mob'?'number':'vehicle') + ".\nCredits not deducted.", true);
            switchPage('pg-dash');
            return;
        }

        await db.ref('users/' + uid).update({ credits: credits - 1 });

        setTimeout(() => {
            switchPage('pg-res');
            render(data);
        }, 800);

    } catch (e) {
        clearInterval(itv);
        bar.style.width = "100%";

        console.error(e);
        const uid = auth.currentUser.uid;
        const type = t === 'mob' ? 'Mobile' : 'Vehicle';

        await db.ref('users/' + uid + '/history').push({
            timestamp: Date.now(),
            type: type,
            query: v,
            success: false,
            status: 'server_error'
        });

        showModal("SERVER ERROR", "Vehicle server is busy or temporarily down.\nPlease try again in 10-20 seconds.\nNo credits deducted.", true);
        switchPage('pg-dash');
    }
}

function render(data) {
    const out = document.getElementById('data-out');
    out.innerHTML = "";
    const skip = ["branding", "developer", "processed_by", "owner_contact", "status", "rc"];
    function walk(obj, parentKey = "") {
        for (let key in obj) {
            if (typeof obj[key] === "object" && obj[key] !== null) {
                walk(obj[key], key);
            } else if (!skip.includes(key.toLowerCase())) {
                let displayKey = parentKey ? parentKey.toUpperCase() + " - " + key.toUpperCase() : key.toUpperCase();
                out.innerHTML += `<div class="res-row"><span style="color:var(--p)">${displayKey}</span><span style="color:#fff">${obj[key]}</span></div>`;
            }
        }
    }
    if (data.details) walk(data.details);   // Vehicle API special case
    else walk(data);
}
